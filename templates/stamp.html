<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打刻画面</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr"></script>
  <style>
    body{font-family:sans-serif;background:#f6f8fb;margin:0}
    header{display:flex;justify-content:space-between;align-items:center;padding:16px;background:#1e66f5;color:#fff;gap:10px}
    .header-right{display:flex;gap:10px;align-items:center}
    .wrap{max-width:1000px;margin:20px auto;padding:16px;display:grid;gap:16px}
    .card{background:#fff;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.08);padding:20px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
    .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    label{display:block;margin:0 0 6px;font-size:14px;font-weight:700}
    input,select,textarea,button{width:100%;padding:10px;border-radius:10px;border:1px solid #ccd3df;box-sizing:border-box}
    button{cursor:pointer;background:#1e66f5;color:#fff;border:none;font-weight:700}
    .secondary{background:#fff;color:#1e66f5;border:1px solid #cbd5e1}
    .status{margin-top:14px;font-size:15px}
    video{width:100%;border-radius:12px;background:#000;max-height:360px}
    canvas{display:none}
    .section-title{font-size:18px;font-weight:700;margin-bottom:12px}
    .stamp-btn.active{background:#134db9}
    .history-list{display:grid;gap:14px}
    .history-card{background:#74a7db;color:#fff;border-radius:18px;padding:18px;box-shadow:0 6px 18px rgba(0,0,0,.08)}
    .history-top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
    .history-date{font-size:22px;font-weight:700}
    .history-name{font-size:22px;font-weight:700}
    .history-type{text-align:center;font-size:20px;font-weight:700;margin:12px 0 18px}
    .history-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .history-box{background:#e9ecef;color:#000;border-radius:6px;padding:12px;text-align:center}
    .history-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .history-label{font-size:18px;font-weight:700}
    .history-value{font-size:18px;font-weight:700}
    .history-footer{margin-top:14px;background:#ecd893;color:#000;border-radius:6px;padding:12px;font-size:18px;font-weight:700}
    .muted{font-size:13px;color:#555}
    @media(max-width:900px){
      .grid2,.grid3,.grid4,.history-grid{grid-template-columns:1fr}
      .history-top{flex-direction:column;align-items:flex-start}
      .history-date,.history-name{font-size:18px}
    }
  </style>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1e66f5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="勤怠">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

</head>
<body>
  <header>
    <div>
      <strong>勤怠管理（社員用）</strong>
      <div id="userInfo"></div>
    </div>
    <div class="header-right">
      <button id="adminBtn" type="button" class="secondary" style="display:none;width:auto;">管理画面</button>
      <button id="logoutBtn" type="button" class="secondary" style="width:auto;">ログアウト</button>
    </div>
  </header>

  <div class="wrap">
    <div class="card">
      <div class="section-title">本日の入力</div>

      <div class="grid2">
        <div>
          <label>日付</label>
          <input id="workDate" type="date">
        </div>
        <div>
          <label>勤務形態（出勤時のみ必須）</label>
          <select id="workType">
            <option value="">選択してください</option>
            <option value="一日勤務">一日勤務</option>
            <option value="半日勤務">半日勤務</option>
            <option value="有給（一日）">有給（一日）</option>
            <option value="有給（半日）">有給（半日）</option>
            <option value="リフレッシュ休暇">リフレッシュ休暇</option>
            <option value="メモリアル休暇">メモリアル休暇</option>
            <option value="忌引き">忌引き</option>
          </select>
        </div>
      </div>

      <div style="margin-top:14px;">
        <label>打刻種別</label>
        <div class="grid4">
          <button type="button" id="clockInBtn" class="stamp-btn" data-type="clock_in">出勤</button>
          <button type="button" class="stamp-btn" data-type="break_start">休憩開始</button>
          <button type="button" class="stamp-btn" data-type="break_end">休憩終了</button>
          <button type="button" class="stamp-btn" data-type="clock_out">退勤</button>
        </div>
      </div>

      <div style="margin-top:16px;">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas"></canvas>
        <button id="startBtn" type="button" style="margin-top:12px;">カメラを起動してQR読み取り開始</button>
        <div class="status" id="status">打刻種別を選択して、カメラを起動してください。</div>
       <!-- <div class="muted">有効QR文字列: KUMAMOTO_HIGO</div> -->
      </div>
    </div>

    <div class="card">
      <div class="section-title">残業申請</div>
      <div class="grid3">
        <div>
          <label>残業申請日時</label>
          <input id="overtimeRequestedAt" type="text" readonly placeholder="申請ボタン押下時に反映">
        </div>
        <div>
          <label>残業終了予定時刻</label>
          <input id="plannedEndTime" type="text" placeholder="例 19:30">
        </div>
        <div>
          <label>残業申請理由</label>
          <input id="overtimeReason" type="text" placeholder="理由を入力">
        </div>
      </div>
      <button id="overtimeBtn" type="button" style="margin-top:14px;">残業申請</button>
    </div>

    <div class="card">
      <div class="section-title">ヘルプ・備考</div>
      <div class="grid3">
        <div>
          <label>ヘルプ有無</label>
          <select id="hasHelp">
            <option value="0">なし</option>
            <option value="1">あり</option>
          </select>
        </div>
        <div>
          <label>ヘルプ部署</label>
          <input id="helpDepartment" type="text" placeholder="ヘルプ部署">
        </div>
        <div>
          <label>ヘルプ時間</label>
          <input id="helpTime" type="text" placeholder="例 2時間">
        </div>
      </div>
      <div style="margin-top:14px;">
        <label>備考欄</label>
        <textarea id="remarks" rows="3" placeholder="備考を入力"></textarea>
      </div>
    </div>

    <div class="card">
      <div class="section-title">自分の過去データ</div>
      <div id="historyList" class="history-list"></div>
    </div>
  </div>

  <script>
    const token = sessionStorage.getItem('token');
    const role = sessionStorage.getItem('role');
    const userName = sessionStorage.getItem('name');

    if (!token) location.href = '/login.html';

    document.getElementById('userInfo').textContent = userName || '';

    document.getElementById('logoutBtn').onclick = () => {
      sessionStorage.clear();
      location.href = '/login.html';
    };

    if (role === 'admin') {
      const btn = document.getElementById('adminBtn');
      btn.style.display = 'inline-block';
      btn.onclick = () => location.href = '/admin.html';
    }

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const historyListEl = document.getElementById('historyList');

    let selectedStampType = null;
    let stream = null;
    let isScanning = false;
    let lastScanTime = 0;

    function todayString() {
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    function timeOnly(v) {
      if (!v) return '0:00';
      const s = String(v);
      const parts = s.split(' ');
      if (parts.length >= 2) return parts[1].slice(0, 5);
      return '0:00';
    }

    function ymdToSlash(v) {
      if (!v) return '';
      return String(v).replaceAll('-', '/');
    }

    function getFormPayload() {
      return {
        work_date: document.getElementById('workDate').value,
        work_type: document.getElementById('workType').value,
        has_help: document.getElementById('hasHelp').value === '1',
        help_department: document.getElementById('helpDepartment').value,
        help_time: document.getElementById('helpTime').value,
        remarks: document.getElementById('remarks').value
      };
    }

   function setSelectedStampType(type) {
  const workType = document.getElementById('workType').value;

  if (type === 'clock_in' && !workType) {
    statusEl.textContent = '勤務形態を選択してください';
    statusEl.style.color = 'red';
    return;
  }

  selectedStampType = type;

  document.querySelectorAll('.stamp-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.type === type);
  });

  statusEl.textContent = `「${document.querySelector('.stamp-btn.active')?.textContent || ''}」を選択しました。QRを読み取ってください。`;
statusEl.style.color = 'black';
}

    document.querySelectorAll('.stamp-btn').forEach(btn => {
      btn.onclick = () => setSelectedStampType(btn.dataset.type);
    });

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' } },
          audio: false
        });
        video.srcObject = stream;
        await video.play();
        requestAnimationFrame(scanLoop);
        statusEl.textContent = selectedStampType
          ? 'QRコードを読み取ってください。'
          : '先に打刻種別を選択してください。';
      } catch (e) {
        statusEl.textContent = 'カメラへのアクセスを許可してください';
        console.error(e);
      }
    }

    async function sendStamp(qrValue) {
      if (!selectedStampType) {
        statusEl.textContent = '先に打刻種別を選択してください。';
        return;
      }

      const payload = {
        ...getFormPayload(),
        type: selectedStampType,
        qr_value: qrValue
      };


      if (selectedStampType === 'clock_in' && !payload.work_type) {
        statusEl.textContent = '出勤時は勤務形態を選択してください。';
        return;
      }

      const res = await fetch('/api/stamp', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      if (!res.ok) {
  statusEl.textContent = data.error || '打刻に失敗しました';
  statusEl.style.color = 'red';   // ← 追加
  return;
}

      const labelMap = {
        clock_in: '出勤',
        break_start: '休憩開始',
        break_end: '休憩終了',
        clock_out: '退勤'
      };
      statusEl.textContent = `${labelMap[data.type]}を記録しました (${timeOnly(data.timestamp)})`;
statusEl.style.color = 'black';
      await loadHistory();
    }

    async function submitOvertime() {
      const workDate = document.getElementById('workDate').value;
      const plannedEndTime = document.getElementById('plannedEndTime').value.trim();
      const overtimeReason = document.getElementById('overtimeReason').value.trim();

      const res = await fetch('/api/overtime-request', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({
          work_date: workDate,
          planned_end_time: plannedEndTime,
          reason: overtimeReason
        })
      });

      const data = await res.json();

      if (!res.ok) {
        statusEl.textContent = data.error || '残業申請に失敗しました';
        return;
      }

      document.getElementById('overtimeRequestedAt').value = new Date().toLocaleString('ja-JP');
      statusEl.textContent = '残業申請を記録しました';
      await loadHistory();
    }

    async function handleScan(text) {
      isScanning = true;
      lastScanTime = Date.now();

      if (text !== 'KUMAMOTO_HIGO') {
        statusEl.textContent = '有効なQRコードではありません';
        setTimeout(() => { isScanning = false; }, 3000);
        return;
      }

      try {
        await sendStamp(text);
      } catch (e) {
        statusEl.textContent = '通信エラーが発生しました';
        console.error(e);
      }

      setTimeout(() => { isScanning = false; }, 3000);
    }

    function scanLoop() {
      requestAnimationFrame(scanLoop);

      if (isScanning) return;
      if (Date.now() - lastScanTime < 2000) return;
      if (!video.srcObject) return;
      if (video.readyState < 2) return;

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, canvas.width, canvas.height);

      if (code) {
        handleScan(code.data);
      }
    }

    function renderHistory(rows) {
      historyListEl.innerHTML = '';

      if (!rows.length) {
        historyListEl.innerHTML = '<div class="muted">まだ打刻履歴がありません。</div>';
        return;
      }

      rows.forEach(row => {
        const card = document.createElement('div');
        card.className = 'history-card';

        const overtimeText = row.overtime_requested_at ? '残業申請あり' : '残業申請なし';

        card.innerHTML = `
          <div class="history-top">
            <div class="history-date">${ymdToSlash(row.work_date)}</div>
            <div class="history-name">${userName || ''}</div>
          </div>

          <div class="history-type">${row.work_type || ''}</div>

          <div class="history-grid">
            <div>
              <div class="history-row">
                <div class="history-label">出勤</div>
                <div class="history-box history-value">${timeOnly(row.clock_in)}</div>
              </div>
              <div class="history-row">
                <div class="history-label">勤務</div>
                <div class="history-box history-value">${row.work_duration || '0:00'}</div>
              </div>
            </div>
            <div>
              <div class="history-row">
                <div class="history-label">退勤</div>
                <div class="history-box history-value">${timeOnly(row.clock_out)}</div>
              </div>
              <div class="history-row">
                <div class="history-label">休憩</div>
                <div class="history-box history-value">${row.break_duration || '0:00'}</div>
              </div>
            </div>
          </div>

          <div class="history-footer">${overtimeText}</div>
        `;

        historyListEl.appendChild(card);
      });
    }

    async function loadHistory() {
      const res = await fetch('/api/my-attendance', {
        headers: { Authorization: 'Bearer ' + token }
      });
      const data = await res.json();
      renderHistory(data);
    }


    document.getElementById('startBtn').onclick = startCamera;
    document.getElementById('overtimeBtn').onclick = submitOvertime;
    document.getElementById('workDate').value = todayString();

    loadHistory();
  </script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}
</script>

</body>
</html>
